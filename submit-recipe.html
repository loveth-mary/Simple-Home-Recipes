<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Recipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Submit Recipe</h1></header>

    <nav>
        <a href="index.html">Home</a>
        <a href="recipes.html">Recipes</a>
        <a href="meal-plan.html">Meal Plan</a>
        <a href="submit-recipe.html">Submit Recipe</a>
        <a href="videos.html">Videos</a>
    </nav>

    <form class="recipe-form">
        <label for="name">Recipe Name:</label>
        <input type="text" id="name" name="name">

        <label for="description">Description:</label>
        <textarea name="description" id="description"></textarea>

        <label for="ingrediants">Ingrediants:</label>
        <textarea name="ingrediants" id="ingrediants"></textarea>

        <label for="instructions">Instructions:</label>
        <textarea name="instructions" id="instructions"></textarea>

        <label for="image">Image URL:</label>
        <input type="text" id="image" name="image">

        <button type="submit">Submit</button>
    </form>

    <footer>
        <p>&copy; 2026 Simple Home Recipes</p>
    </footer>
    
</body>
</html>
